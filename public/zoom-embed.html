<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zoom Embed</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0f172a; }
    #zoom-root { width: 100%; height: 100%; }
    #zoom-root > div { width: 100% !important; height: 100% !important; }
    #status { 
      color: #94a3b8; 
      font-family: system-ui, sans-serif; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      height: 100%; 
      font-size: 14px; 
    }
  </style>
</head>
<body>
  <div id="zoom-root">
    <div id="status">Loading Zoom SDK...</div>
  </div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://source.zoom.us/5.1.2/zoom-meeting-embedded-5.1.2.min.js"></script>

  <script>
    const statusEl = document.getElementById('status');

    function updateStatus(msg) {
      if (statusEl) statusEl.textContent = msg;
    }

    async function initZoom(config) {
      try {
        if (typeof ZoomMtgEmbedded === 'undefined') {
          updateStatus('Error: Zoom SDK failed to load');
          return;
        }

        updateStatus('Initializing Zoom...');
        const client = ZoomMtgEmbedded.createClient();
        const zoomRoot = document.getElementById('zoom-root');
        
        // Clear the status message before mounting
        statusEl && statusEl.remove();

        client.init({
          zoomAppRoot: zoomRoot,
          language: 'en-US',
          patchJsMedia: true,
          customize: {
            meetingInfo: ['topic', 'host', 'mn', 'pwd', 'telPwd', 'invite', 'participant', 'dc', 'enctype'],
          },
        });

        updateStatus && console.log('Joining meeting...');
        await client.join({
          sdkKey: config.sdkKey,
          signature: config.signature,
          meetingNumber: config.meetingNumber,
          password: config.password || '',
          userName: config.userName,
          userEmail: config.userEmail || '',
        });

        // Notify parent of success
        window.parent.postMessage({ type: 'zoom-join-success' }, '*');
      } catch (err) {
        console.error('Zoom init error:', err);
        var errMsg = 'Unknown error';
        if (err && typeof err === 'object') {
          errMsg = err.reason || err.message || JSON.stringify(err);
        } else if (err) {
          errMsg = String(err);
        }
        window.parent.postMessage({ type: 'zoom-error', error: errMsg }, '*');
      }
    }

    // Listen for config from parent
    window.addEventListener('message', (event) => {
      if (event.data && event.data.type === 'zoom-init') {
        initZoom(event.data.config);
      }
    });

    // Let parent know we're ready
    window.parent.postMessage({ type: 'zoom-ready' }, '*');
  </script>
</body>
</html>
